<script>
$(function(){

  $('.slots-machine').each(function(){
    var machine = new SlotsMachine(this, $(this).data('slots'), {
      init: $(this).data('init'),
      rowHeight: $(this).data('height')
    });

    $(this).on('click tochstart', function(){
      (machine.state == 'stop') ? machine.start() : machine.stop($(this).data('result'));
    });

    $(this).css('cursor', 'pointer');
  })

});
</script>
